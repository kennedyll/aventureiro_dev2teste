<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caderno de Campanha — Produtividade RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
</head>
<body style="margin:0;">

<style>
:root{
  --paper:#F2F7FC;
  --card:#FFFFFF;
  --card-soft:#EAF3FB;
  --ink:#1E2D3D;
  --ink-soft:#57708A;
  --ink-faint:#93A7BB;
  --line: rgba(30,45,61,0.09);
  --line-strong: rgba(30,45,61,0.15);

  --estudo:#2E6FA8;    --estudo-bg:#E3EFFA;
  --leitura:#5D6BBE;   --leitura-bg:#EAECFA;
  --boxe:#2E93A6;      --boxe-bg:#E1F3F6;
  --academia:#356089;  --academia-bg:#E3ECF5;
  --corrida:#2F9BCF;   --corrida-bg:#E2F4FC;
  --gold:#2F7FE0;      --gold-bg:#E5F0FE;
  --danger:#C0392B;    --danger-bg:#FBEAE7;

  --radius:16px;
  --radius-sm:10px;
  --shadow-sm: 0 1px 2px rgba(30,45,61,0.06), 0 1px 1px rgba(30,45,61,0.04);
  --shadow-md: 0 6px 18px -8px rgba(30,45,61,0.20), 0 2px 6px -2px rgba(30,45,61,0.10);
}
*{box-sizing:border-box;}
html, body{ height:100%; margin:0; }
body{
  background:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,0.9), transparent 45%),
    radial-gradient(circle at 85% 85%, rgba(207,226,247,0.8), transparent 55%),
    linear-gradient(160deg, #C7DBF2 0%, #AFCBE9 55%, #9CBEE3 100%);
  overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  padding:26px;
}
.rpg-root{
  font-family:'Inter', system-ui, sans-serif;
  color:var(--ink);
  background:var(--paper);
  width:100%; max-width:1360px; height:100%; max-height:960px;
  overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  border-radius:26px;
  box-shadow:
    0 50px 100px -30px rgba(15,35,60,0.45),
    0 18px 40px -20px rgba(15,35,60,0.30),
    0 0 0 1px rgba(255,255,255,0.5) inset;
  position:relative;
  transform:translateZ(0);
}
.display{ font-family:'Fraunces', Georgia, serif; }
.mono{ font-family:'JetBrains Mono', monospace; }
svg.ic{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; flex:none; display:block; }
svg.ic.filled{ fill:currentColor; stroke:none; }

@media (max-width:860px){
  body{ padding:0; }
  .rpg-root{ max-width:100%; max-height:100%; height:100%; border-radius:0; box-shadow:none; }
}

/* ---------------- layout shell ---------------- */
.shell{ display:flex; min-height:100%; }

.sidebar{
  width:216px; flex:none; background:var(--card-soft);
  border-right:1px solid var(--line-strong);
  padding:22px 14px; position:sticky; top:0; align-self:flex-start; height:100%; overflow-y:auto;
  display:flex; flex-direction:column; gap:22px;
}
.brand{ display:flex; align-items:center; gap:10px; padding:0 8px; }
.brand .mark{
  width:34px; height:34px; border-radius:10px; background:var(--ink); color:var(--paper);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 3px 0 rgba(9,17,26,0.3), 0 5px 10px -3px rgba(9,17,26,0.35);
}
.brand .name{ font-family:'Fraunces'; font-weight:600; font-size:15.5px; line-height:1.15; }
.brand .sub{ font-size:10.5px; color:var(--ink-faint); letter-spacing:0.04em; }

.level-card{
  background:var(--card); border:1px solid var(--line-strong); border-radius:var(--radius);
  padding:14px; box-shadow:var(--shadow-sm);
  transform-style:preserve-3d; will-change:transform; transition:transform .18s ease, box-shadow .18s ease;
}
.level-card:hover{ box-shadow:var(--shadow-md); }
.ring-wrap{ display:flex; align-items:center; gap:12px; }
.ring{ position:relative; width:56px; height:56px; flex:none; }
.ring svg{ transform:rotate(-90deg); }
.ring .lvl{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.ring .lvl b{ font-family:'Fraunces'; font-size:19px; line-height:1; }
.ring .lvl span{ font-size:7.5px; letter-spacing:0.08em; color:var(--ink-faint); text-transform:uppercase; }
.level-title{ font-family:'Fraunces'; font-weight:600; font-size:13.5px; }
.level-xp{ font-size:10.5px; color:var(--ink-faint); font-family:'JetBrains Mono'; }

.nav{ display:flex; flex-direction:column; gap:3px; }
.nav-btn{
  display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--radius-sm);
  border:none; background:transparent; color:var(--ink-soft); font-size:13.5px; font-weight:500;
  cursor:pointer; text-align:left; width:100%; transition:background .15s ease, color .15s ease;
}
.nav-btn:hover{ background:rgba(30,45,61,0.05); color:var(--ink); }
.nav-btn.active{ background:var(--ink); color:var(--paper); }
.nav-btn .ic{ opacity:0.85; }

.streaks-mini{ display:flex; flex-direction:column; gap:6px; }
.streaks-mini .row{ display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--ink-soft); }
.streaks-mini .dot{ width:8px; height:8px; border-radius:50%; flex:none; }
.streaks-mini b{ color:var(--ink); font-family:'JetBrains Mono'; }

.sidebar-foot{ margin-top:auto; }
.reset-link{ background:none;border:none;color:var(--ink-faint); font-size:11px; cursor:pointer; text-decoration:underline; padding:0;}

/* mobile topbar + bottom nav */
.mobile-top{ display:none; }
.mobile-nav{ display:none; }

/* ---------------- main content ---------------- */
.main{ flex:1; min-width:0; padding:30px 34px 80px; max-width:820px; }
.page-head{ margin-bottom:22px; }
.page-head .eyebrow{ font-size:11.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-faint); font-weight:600; }
.page-head h1{ font-family:'Fraunces'; font-weight:600; font-size:26px; margin:2px 0 0; }
.page-head p{ color:var(--ink-soft); font-size:14px; margin:6px 0 0; max-width:56ch; }

.card{
  background:var(--card); border:1px solid var(--line-strong); border-radius:var(--radius);
  padding:20px; margin-bottom:16px; box-shadow:var(--shadow-sm);
  transition: transform .22s cubic-bezier(.2,.8,.3,1), box-shadow .22s ease;
}
.card:hover{ transform:translateY(-3px); box-shadow:var(--shadow-md); }
.card h2{ font-family:'Fraunces'; font-weight:600; font-size:17px; margin:0 0 4px; display:flex; align-items:center; gap:9px; flex-wrap:wrap;}
.card h3{ font-family:'Fraunces'; font-weight:600; font-size:15px; margin:18px 0 8px; }
.muted{ color:var(--ink-soft); font-size:13px; }
.faint{ color:var(--ink-faint); font-size:12px; }

/* banner */
.banner{
  display:flex; align-items:center; gap:10px; background:var(--gold-bg); color:#1C4E8A;
  border:1px solid rgba(184,145,43,0.35); border-radius:var(--radius-sm); padding:11px 14px; margin-bottom:16px;
  font-size:13.5px; font-weight:500; animation: pop .4s cubic-bezier(.2,1.4,.4,1);
}
@keyframes pop{ from{opacity:0; transform:translateY(-6px) scale(0.97);} to{opacity:1; transform:none;} }
.banner.warn{ background:var(--danger-bg); color:#8A2E22; border-color:rgba(178,58,46,0.35); }
.banner .close{ margin-left:auto; background:none; border:none; cursor:pointer; color:inherit; opacity:0.6; padding:2px;}
.banner .close:hover{ opacity:1; }
.rule-note{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--danger); background:var(--danger-bg);
  border-radius:999px; padding:5px 11px; margin-top:8px; width:fit-content; }

/* quest rows */
.quest-list{ display:flex; flex-direction:column; }
.quest{
  display:flex; align-items:center; gap:13px; padding:12px 6px; border-bottom:1px solid var(--line);
  transition:background .15s ease;
}
.quest:last-child{ border-bottom:none; }
.quest:hover{ background:rgba(30,45,61,0.025); }

.checkbox{
  width:24px; height:24px; border-radius:8px; border:2px solid var(--line-strong); flex:none;
  cursor:pointer; display:flex; align-items:center; justify-content:center; position:relative;
  transition:background .18s ease, border-color .18s ease, transform .12s ease;
  background:var(--card);
}
.checkbox:hover{ border-color:var(--ink-faint); }
.checkbox.done{ background:var(--estudo); border-color:var(--estudo); box-shadow:0 2px 5px -1px rgba(46,111,168,0.5); animation:checkPop .35s cubic-bezier(.3,1.6,.4,1); }
@keyframes checkPop{ 0%{ transform:scale(0.75); } 60%{ transform:scale(1.12); } 100%{ transform:scale(1); } }
.checkbox:active{ transform:scale(0.9); }
.checkbox svg{ width:14px; height:14px; stroke:#fff; stroke-width:2.6; fill:none; stroke-linecap:round; stroke-linejoin:round;
  stroke-dasharray:20; stroke-dashoffset:20; transition:stroke-dashoffset .25s ease .05s; }
.checkbox.done svg{ stroke-dashoffset:0; }

.q-icon{
  width:32px; height:32px; border-radius:9px; flex:none; display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 0 rgba(9,17,26,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
  transition:transform .2s cubic-bezier(.2,1.4,.4,1);
}
.quest:hover .q-icon{ transform:translateY(-1px) scale(1.05); }
.q-body{ flex:1; min-width:0; }
.q-name{ font-size:14px; font-weight:500; transition:color .15s ease; }
.q-name.done{ color:var(--ink-faint); text-decoration:line-through; text-decoration-color:var(--ink-faint); }
.q-xp{ font-family:'JetBrains Mono'; font-size:10.5px; color:var(--ink-faint); }
.q-del{ background:none;border:none;color:var(--ink-faint); cursor:pointer; padding:4px; border-radius:6px; opacity:0; transition:opacity .15s;}
.quest:hover .q-del{ opacity:1; }
.q-del:hover{ color:var(--boxe); background:var(--boxe-bg); }

.empty{ font-size:13px; color:var(--ink-faint); font-style:italic; padding:14px 4px; text-align:center; }

/* forms */
.inline-form{ display:flex; gap:8px; margin-top:14px; }
input.field, textarea.field{
  font-family:'Inter'; font-size:13.5px; padding:10px 12px; border:1px solid var(--line-strong);
  border-radius:var(--radius-sm); background:var(--card-soft); color:var(--ink); width:100%;
  transition:border-color .15s ease, box-shadow .15s ease;
}
input.field:focus, textarea.field:focus{ outline:none; border-color:var(--ink-soft); box-shadow:0 0 0 3px rgba(30,45,61,0.08); }
textarea.field{ min-height:90px; resize:vertical; }
.btn{
  font-family:'Inter'; font-weight:600; font-size:13.5px; cursor:pointer; border-radius:var(--radius-sm);
  border:1px solid var(--ink); background:var(--ink); color:var(--paper); padding:10px 16px; white-space:nowrap;
  transition:background .15s ease, transform .12s ease, box-shadow .12s ease;
  box-shadow:0 3px 0 rgba(9,17,26,0.35), 0 5px 10px -4px rgba(9,17,26,0.35);
  position:relative; top:0;
}
.btn:hover{ background:#2E4258; transform:translateY(-1px); box-shadow:0 4px 0 rgba(9,17,26,0.35), 0 8px 14px -4px rgba(9,17,26,0.4); }
.btn:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(9,17,26,0.35), 0 2px 6px -2px rgba(9,17,26,0.4); }
.btn.ghost{ background:transparent; color:var(--ink); box-shadow:none; }
.btn.ghost:hover{ background:rgba(30,45,61,0.06); transform:none; box-shadow:none; }
.btn.block{ width:100%; }

/* --------------- dashboard hero --------------- */
.hero{
  background:var(--card); border:1px solid var(--line-strong); border-radius:var(--radius);
  padding:22px; margin-bottom:16px; display:flex; align-items:center; gap:22px; box-shadow:var(--shadow-sm);
  flex-wrap:wrap;
  transform-style:preserve-3d; will-change:transform; transition:transform .18s ease, box-shadow .18s ease;
}
.hero:hover{ box-shadow:var(--shadow-md); }
.hero-ring{ position:relative; width:98px; height:98px; flex:none; }
.hero-ring svg{ transform:rotate(-90deg); }
.hero-ring .lvl{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.hero-ring .lvl b{ font-family:'Fraunces'; font-size:32px; line-height:1; }
.hero-ring .lvl span{ font-size:9px; letter-spacing:0.08em; color:var(--ink-faint); text-transform:uppercase; }
.hero-info{ flex:1; min-width:220px; }
.hero-info .title{ font-family:'Fraunces'; font-weight:600; font-size:19px; }
.hero-info .xp{ font-family:'JetBrains Mono'; font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
.xpbar-track{ height:8px; background:rgba(30,45,61,0.09); border-radius:5px; overflow:hidden; margin-top:8px; width:100%; max-width:340px;}
.xpbar-fill{ height:100%; background:linear-gradient(90deg,var(--gold),#7FB3EF); transition:width .5s ease; border-radius:5px;}
.streak-chips{ display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
.streak-chip{
  display:flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; font-size:11.5px; font-weight:600;
}

/* --------------- study track --------------- */
.timeline{ position:relative; padding-left:38px; }
.timeline::before{ content:''; position:absolute; left:15px; top:6px; bottom:6px; width:2px; background:var(--line-strong); }
.phase{ position:relative; margin-bottom:8px; }
.phase-node{
  position:absolute; left:-38px; top:14px; width:32px; height:32px; border-radius:50%;
  border:2px solid var(--estudo); background:var(--card); color:var(--estudo);
  display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono'; font-size:12px; font-weight:700;
  z-index:1;
}
.phase-node.complete{ background:var(--estudo); color:#fff; }
.phase-head{
  display:flex; align-items:center; gap:12px; padding:12px 14px; cursor:pointer; border-radius:var(--radius-sm);
  border:1px solid var(--line-strong); background:var(--card-soft); transition:background .15s ease;
}
.phase-head:hover{ background:var(--card); }
.phase-title{ font-family:'Fraunces'; font-weight:600; font-size:15px; flex:1; }
.phase-dur{ font-family:'JetBrains Mono'; font-size:10.5px; color:var(--ink-faint); }
.phase-pct{ font-family:'JetBrains Mono'; font-size:11px; color:var(--estudo); font-weight:700; width:34px; text-align:right;}
.chevron{ transition:transform .2s ease; color:var(--ink-faint); }
.chevron.open{ transform:rotate(180deg); }
.phase-body{ overflow:hidden; max-height:0; transition:max-height .3s ease; }
.phase-body.open{ max-height:900px; }
.phase-body-inner{ padding:10px 4px 6px 4px; }
.project-note{
  margin-top:8px; padding:11px 13px; background:var(--estudo-bg); border-radius:var(--radius-sm);
  font-size:13px; color:#1F4E75; display:flex; gap:8px; align-items:flex-start;
}

.bonus-group{ margin-bottom:4px; }
.bonus-group h4{ font-size:12.5px; font-weight:700; color:var(--ink-soft); margin:14px 0 7px; text-transform:uppercase; letter-spacing:0.03em;}
.chip-list{ display:flex; flex-wrap:wrap; gap:8px; }
.chip{
  border:1px solid var(--line-strong); padding:7px 12px; border-radius:999px; font-size:12.5px; cursor:pointer;
  display:flex; align-items:center; gap:7px; background:var(--card-soft); transition:all .15s ease; color:var(--ink-soft);
  font-family:inherit;
}
.chip:hover{ border-color:var(--ink-faint); }
.chip.done{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
.chip svg{ width:13px; height:13px; }

/* --------------- skills --------------- */
.skill-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
.skill{
  border:1px solid var(--line-strong); border-radius:var(--radius); padding:16px; background:var(--card);
  position:relative; overflow:hidden; transition:box-shadow .18s ease;
  transform-style:preserve-3d; will-change:transform;
}
.skill.unlocked{ box-shadow:0 0 0 2px var(--gold) inset; }
.skill:hover{ box-shadow:var(--shadow-md), 0 0 0 2px var(--gold) inset; }
.skill.locked{ background:var(--card-soft); }
.skill.locked .sk-icon{ filter:grayscale(1); opacity:0.5; }
.skill.locked .sk-name, .skill.locked .sk-desc{ color:var(--ink-faint); }
.sk-icon{ width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; }
.sk-name{ font-family:'Fraunces'; font-weight:600; font-size:14.5px; }
.sk-desc{ font-size:12px; color:var(--ink-soft); margin:4px 0 10px; }
.sk-track{ height:5px; background:rgba(30,45,61,0.09); border-radius:4px; overflow:hidden; }
.sk-fill{ height:100%; border-radius:4px; }
.sk-prog{ font-family:'JetBrains Mono'; font-size:10px; color:var(--ink-faint); margin-top:5px; }
.sk-badge{ position:absolute; top:12px; right:12px; color:var(--gold); }

/* --------------- diary --------------- */
.diary-entry{ padding:12px 4px; border-bottom:1px solid var(--line); display:flex; gap:12px; }

/* --------------- comunidade --------------- */
.friend-row{
  display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
  padding:12px 6px; border-bottom:1px solid var(--line);
}
.friend-row:last-child{ border-bottom:none; }
.friend-info{ flex:1; min-width:180px; }
.mini-chip-row{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.mini-chip{
  display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:600;
  padding:3px 8px; border-radius:999px;
}
.mini-chip svg{ width:11px; height:11px; }
.cheer-panel{ display:flex; flex-wrap:wrap; gap:7px; padding:0 6px 12px; }
.cheer-panel .chip{ font-size:12px; }
code.mono{ background:var(--card-soft); border:1px solid var(--line-strong); border-radius:5px; padding:1px 6px; }
.rank-badge{
  width:28px; height:28px; border-radius:50%; border:2px solid var(--ink-faint); flex:none;
  display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono'; font-weight:700; font-size:12px;
}
.diary-entry:last-child{ border-bottom:none; }
.diary-entry .d-icon{ width:30px; height:30px; border-radius:9px; background:var(--leitura-bg); color:var(--leitura); flex:none; display:flex; align-items:center; justify-content:center; }
.diary-entry .d-date{ font-family:'JetBrains Mono'; font-size:10px; color:var(--ink-faint); margin-bottom:3px; }
.diary-entry p{ margin:0; white-space:pre-wrap; font-size:13.5px; line-height:1.55; }

.loading{ display:flex; align-items:center; justify-content:center; height:100vh; font-family:'JetBrains Mono'; color:var(--ink-faint); font-size:13px; gap:10px;}
.spin{ width:16px; height:16px; border:2px solid var(--line-strong); border-top-color:var(--ink-soft); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }

@media (max-width:860px){
  .sidebar{ display:none; }
  .mobile-top{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px 16px; position:sticky; top:0; z-index:5; background:var(--paper);
    border-bottom:1px solid var(--line-strong);
  }
  .mobile-top .brand{ padding:0; }
  .mobile-top .ring{ width:40px; height:40px; }
  .mobile-top .ring .lvl b{ font-size:14px; }
  .main{ padding:18px 16px 90px; max-width:none; }
  .mobile-nav{
    display:flex; position:fixed; bottom:0; left:0; right:0; background:var(--card);
    border-top:1px solid var(--line-strong); z-index:6; padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  }
  .mobile-nav button{
    flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:6px 2px; color:var(--ink-faint); font-size:9.5px; font-weight:600; cursor:pointer;
  }
  .mobile-nav button.active{ color:var(--ink); }
  .hero{ flex-direction:column; align-items:flex-start; }
}
</style>

<div class="rpg-root">
<div id="app"><div class="loading"><span class="spin"></span> carregando sua jornada…</div></div>
</div>

<script>
(function(){

/* ================= ÍCONES ================= */
function icon(name, extra){
  var cls = 'ic' + (extra ? ' '+extra : '');
  var map = {
    book: '<path d="M4 5.5C4 4.67 4.67 4 5.5 4H11v16H5.5C4.67 20 4 19.33 4 18.5z"/><path d="M20 5.5C20 4.67 19.33 4 18.5 4H13v16h5.5c.83 0 1.5-.67 1.5-1.5z"/>',

var hasClaudeStorage = (typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function');

async function kvGet(key){
  if(hasClaudeStorage){
    return await window.storage.get(key, false);
  }
  try{
    var v = localStorage.getItem(key);
    return v!==null ? { key:key, value:v, shared:false } : null;
  }catch(e){ return null; }
}
async function kvSet(key, value){
  if(hasClaudeStorage){
    return await window.storage.set(key, value, false);
  }
  try{ localStorage.setItem(key, value); return { key:key, value:value, shared:false }; }
  catch(e){ return null; }
}

var state = null;

var openPhase = 0;
var penaltyMessage = null;
var monthlyWinMessage = null;

function todayKey(){ return fmt(new Date()); }
function fmt(d){
  var y=d.getFullYear(), m=('0'+(d.getMonth()+1)).slice(-2), day=('0'+d.getDate()).slice(-2);
  return y+'-'+m+'-'+day;
}
function monthKey(d){
  d = d || new Date();
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2);
}
var MONTH_NAMES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function monthLabel(mk){
  var parts = mk.split('-');
  return MONTH_NAMES[parseInt(parts[1],10)-1]+'/'+parts[0];
}
function addXP(amount){
  state.totalXP += amount;
  var mk = monthKey();
  state.monthlyXP[mk] = (state.monthlyXP[mk]||0) + amount;
  if(state.monthlyXP[mk] < 0) state.monthlyXP[mk] = 0;
}
function defaultState(){
  return {
    totalXP:0,
    taskLog:{},
    customTasks:[],
    javaProgress: STUDY_PHASES.map(function(p){ return p.tasks.map(function(){return false;}); }),
    bonusProgress: BONUS_TRACK.map(function(g){ return g.items.map(function(){return false;}); }),
    employability: DEFAULT_EMPLOYABILITY.map(function(t,i){ return {id:'e'+i, text:t, done:false}; }),
    diary: [],
    diaryAwarded: {},
    lastPenaltyCheck: todayKey(),
    myCode: null,
    myName: '',
    friends: [],
    monthlyXP: {},
    monthlyWins: 0,
    winHistory: [],
    lastMonthCheck: monthKey()
  };
}

async function loadState(){
  try{
    var r = await kvGet('rpg-state-v2');
    if(r && r.value){
      var loaded = JSON.parse(r.value);
      state = Object.assign(defaultState(), loaded);
      if(!state.javaProgress || state.javaProgress.length !== STUDY_PHASES.length){
        state.javaProgress = STUDY_PHASES.map(function(p){return p.tasks.map(function(){return false;});});
      }
      if(!state.bonusProgress || state.bonusProgress.length !== BONUS_TRACK.length){
        state.bonusProgress = BONUS_TRACK.map(function(g){return g.items.map(function(){return false;});});
      }
    } else {
      // tenta migrar de uma versão anterior, se existir
      try{
        var old = await kvGet('rpg-state-v1');
        if(old && old.value){ state = Object.assign(defaultState(), JSON.parse(old.value)); }
        else { state = defaultState(); }
      }catch(e2){ state = defaultState(); }
    }
  }catch(e){
    state = defaultState();
  }
  if(!state.lastPenaltyCheck) state.lastPenaltyCheck = todayKey();
  if(!state.monthlyXP) state.monthlyXP = {};
  if(typeof state.monthlyWins !== 'number') state.monthlyWins = 0;
  if(!state.winHistory) state.winHistory = [];
  if(!state.lastMonthCheck) state.lastMonthCheck = monthKey();
  if(!state.friends) state.friends = [];
  var penaltyResult = processMissedDays();
  if(penaltyResult.days>0){
    penaltyMessage = 'Você deixou missões incompletas em '+penaltyResult.days+' dia(s) anterior(es) — perdeu '+penaltyResult.xpLost+' XP.';
  }
  saveState();
  render();
}

function processMissedDays(){
  var today = todayKey();
  var d = new Date(state.lastPenaltyCheck);
  d.setDate(d.getDate()+1);
  var customIds = state.customTasks.map(function(t){return t.id;});
  var daysAffected = 0, xpLost = 0, guard = 0;
  while(fmt(d) < today && guard < 90){
    var key = fmt(d), dow = d.getDay();
    var log = state.taskLog[key] || {};
    var cats = ['estudo','leitura','boxe','academia','corrida'].filter(function(c){ return isScheduled(c,dow); });
    var hasAnything = cats.length>0 || customIds.length>0;
    var allDone = cats.every(function(c){return log[c];}) && customIds.every(function(id){return log.custom && log.custom[id];});
    if(hasAnything && !allDone && !log.penaltyApplied){
      log.penaltyApplied = true;
      addXP(-40);
      state.taskLog[key] = log;
      daysAffected++; xpLost += 40;
    }
    d.setDate(d.getDate()+1);
    guard++;
  }
  if(state.totalXP<0) state.totalXP = 0;
  state.lastPenaltyCheck = today;
  return { days:daysAffected, xpLost:xpLost };
}

async function saveState(){
  try{ await kvSet('rpg-state-v2', JSON.stringify(state)); }
  catch(e){ /* falha silenciosa de gravação */ }
}

function level(){ return Math.floor(state.totalXP/100)+1; }
function xpIntoLevel(){ return state.totalXP%100; }
function titleForLevel(lv){
  if(lv<3) return 'Aprendiz Arcano do Hello World';
  if(lv<6) return 'Escudeiro do Loop';
  if(lv<10) return 'Caçador de Bugs';
  if(lv<15) return 'Cavaleiro do Merge Conflict';
  if(lv<20) return 'Arquimago da Arquitetura';
  return 'Lenda do Deploy em Produção';
}

function isScheduled(cat, dow){
  if(cat==='estudo' || cat==='leitura') return true;
  if(cat==='boxe') return dow===1 || dow===3;
  if(cat==='academia') return dow===2 || dow===4 || dow===6;
  if(cat==='corrida') return dow===6;
  return false;
}

function streakFor(s, cat){
  var count=0, d=new Date(), first=true;
  for(var i=0;i<365;i++){
    var key = fmt(d), dow = d.getDay();
    if(isScheduled(cat,dow)){
      var done = s.taskLog[key] && s.taskLog[key][cat];
      if(done){ count++; }
      else if(!first){ break; }
    }
    first=false;
    d.setDate(d.getDate()-1);
  }
  return count;
}
function countDone(s, cat){
  var n=0;
  for(var k in s.taskLog){ if(s.taskLog[k] && s.taskLog[k][cat]) n++; }
  return n;
}
function monthlyCategoryCounts(s, mk){
  var counts = {};
  Object.keys(CATS).forEach(function(k){ counts[k]=0; });
  for(var key in s.taskLog){
    if(key.slice(0,7) !== mk) continue;
    var log = s.taskLog[key];
    Object.keys(CATS).forEach(function(k){ if(log && log[k]) counts[k]++; });
  }
  return counts;
}
function bestHabitOf(counts){
  var best = null;
  Object.keys(CATS).forEach(function(k){
    var v = (counts && counts[k]) || 0;
    if(v>0 && (!best || v>best.count)){ best = { cat:k, count:v }; }
  });
  return best;
}
function phaseComplete(s, idx){
  var arr = s.javaProgress[idx];
  return arr && arr.every(function(v){return v;});
}
function bonusGroupComplete(s, gi){
  var arr = s.bonusProgress[gi];
  return arr && arr.every(function(v){return v;});
}
function countPerfectDays(s){
  var n=0;
  for(var k in s.taskLog){ if(s.taskLog[k] && s.taskLog[k].perfectAwarded) n++; }
  return n;
}
function levelOf(s){ return Math.floor(s.totalXP/100)+1; }
function countStudyItemsDone(s){
  var n=0; s.javaProgress.forEach(function(arr){ arr.forEach(function(v){ if(v) n++; }); }); return n;
}
function countBonusItemsDone(s){
  var n=0; s.bonusProgress.forEach(function(arr){ arr.forEach(function(v){ if(v) n++; }); }); return n;
}
function totalDailyTasksDone(s){
  var n=0; ['estudo','leitura','boxe','academia','corrida'].forEach(function(c){ n+=countDone(s,c); }); return n;
}
function perfectStreak(s){
  var count=0, d=new Date(), first=true;
  for(var i=0;i<400;i++){
    var key = fmt(d);
    var done = s.taskLog[key] && s.taskLog[key].perfectAwarded;
    if(done){ count++; } else if(!first){ break; }
    first=false;
    d.setDate(d.getDate()-1);
  }
  return count;
}
function countCustomDone(s){
  var n=0;
  for(var k in s.taskLog){
    var log = s.taskLog[k];
    if(log && log.custom){ for(var id in log.custom){ if(log.custom[id]) n++; } }
  }
  return n;
}
function todaysCategories(){
  var dow = new Date().getDay();
  var out = [];
  ['estudo','leitura','boxe','academia','corrida'].forEach(function(c){
    if(isScheduled(c,dow)) out.push(c);
  });
  return out;
}
function ensureLog(key){
  if(!state.taskLog[key]) state.taskLog[key] = {};
  return state.taskLog[key];
}

function toggleCategoryTask(cat){
  var key = todayKey();
  var log = ensureLog(key);
  var was = !!log[cat];
  log[cat] = !was;
  addXP(was ? -XP.task : XP.task);
  checkPerfectDay(key, log);
  afterChange();
}
function toggleCustomTask(id){
  var key = todayKey();
  var log = ensureLog(key);
  if(!log.custom) log.custom = {};
  var was = !!log.custom[id];
  log.custom[id] = !was;
  addXP(was ? -XP.task : XP.task);
  checkPerfectDay(key, log);
  afterChange();
}
function checkPerfectDay(key, log){
  var cats = todaysCategories();
  var customIds = state.customTasks.map(function(t){return t.id;});
  var allDone = cats.every(function(c){return log[c];}) &&
                customIds.every(function(id){return log.custom && log.custom[id];});
  if(allDone && !log.perfectAwarded){
    log.perfectAwarded = true;
    addXP(XP.perfectDay);
  } else if(!allDone && log.perfectAwarded){
    log.perfectAwarded = false;
    addXP(-XP.perfectDay);
  }

  var html = '<div class="page-head"><span class="eyebrow">'+WEEKDAYS[dow]+'</span>'+
    '<h1>'+greeting()+', aventureiro-dev</h1>'+
    '<p>Aqui estão as missões que mantêm sua campanha em movimento hoje.</p></div>';

  html += '<div class="hero">'+
    '<div class="hero-ring">'+ringSVG(pct,98,9,'var(--gold)')+'<div class="lvl"><b>'+lv+'</b><span>nível</span></div></div>'+
    '<div class="hero-info">'+
      '<div class="title">'+titleForLevel(lv)+'</div>'+
      '<div class="xp">'+state.totalXP+' XP acumulados · faltam '+(100-pct)+' XP para o próximo nível</div>'+
      '<div class="xpbar-track"><div class="xpbar-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="streak-chips">'+ Object.keys(CATS).map(function(k){
        var c = CATS[k], st = streakFor(state,k);
        return '<div class="streak-chip" style="background:var(--'+c.color+'-bg);color:var(--'+c.color+')">'+icon(c.icon)+' '+st+' dia(s) — '+c.label+'</div>';
      }).join('') +'</div>'+
    '</div>'+
  '</div>';

  var customIds = state.customTasks.map(function(t){return t.id;});
  var allDone = cats.length+customIds.length>0 && cats.every(function(c){return log[c];}) && customIds.every(function(id){return log.custom && log.custom[id];});
  if(monthlyWinMessage){
    html += '<div class="banner">'+icon('trophy')+' '+esc(monthlyWinMessage)+'<button class="close" id="dismissMonthlyWin">✕</button></div>';
  }
  if(penaltyMessage){
    html += '<div class="banner warn">'+icon('trash')+' '+esc(penaltyMessage)+'<button class="close" id="dismissPenalty">✕</button></div>';
  }
  if(allDone){
    html += '<div class="banner">'+icon('fire')+' Dia perfeito! Todas as missões de hoje concluídas — bônus de +'+XP.perfectDay+' XP garantido.</div>';
  }

  html += '<div class="card"><h2>'+icon('check2')+' Missões de hoje</h2>'+
    '<div class="rule-note">'+icon('trash')+' Missões não concluídas até o fim do dia custam <b>&nbsp;-40 XP</b></div>';
  if(!cats.length && !state.customTasks.length){
    html += '<div class="empty">Nenhuma missão agendada para hoje. Aproveite para descansar ou adiantar leitura extra.</div>';
  } else {
    html += '<div class="quest-list">';
    cats.forEach(function(c){ html += questRow('cat:'+c, CATS[c].label, !!log[c], c, XP.task); });
    state.customTasks.forEach(function(t){
      html += questRow('custom:'+t.id, t.text, !!(log.custom && log.custom[t.id]), null, XP.task, t.id);
    });
    html += '</div>';
  }
  html += '<div class="inline-form">'+
    '<input class="field" id="newTaskInput" placeholder="Adicionar tarefa diária (ex: alongar, meditar…)"/>'+
    '<button class="btn" id="addTaskBtn">'+icon('plus')+'</button>'+
  '</div></div>';

  return html;
}

function questRow(key, label, done, catKey, xp, delId){
  var iconHtml, bg='var(--card-soft)', fg='var(--ink-soft)';
  if(catKey){
    var c = CATS[catKey];
    bg = 'var(--'+c.color+'-bg)'; fg='var(--'+c.color+')';
    iconHtml = icon(c.icon);
  } else {
    iconHtml = icon('plus');
  }
  var delBtn = delId ? '<button class="q-del" data-remove="'+delId+'">'+icon('trash')+'</button>' : '';
  return '<div class="quest">'+
    '<div class="checkbox'+(done?' done':'')+'" data-toggle="'+key+'"><svg viewBox="0 0 24 24"><path d="M4 12l6 6L20 6"/></svg></div>'+
    '<div class="q-icon" style="background:'+bg+';color:'+fg+'">'+iconHtml+'</div>'+
    '<div class="q-body"><div class="q-name'+(done?' done':'')+'">'+esc(label)+'</div><div class="q-xp">+'+xp+' XP</div></div>'+
    delBtn+
  '</div>';
}

function renderHabilidades(){
  var totalUnlocked = SKILL_DEFS.filter(function(sk){ return sk.prog(state) >= sk.need; }).length;

    '<p>Desbloqueadas pela sua constância nos treinos e estudos — '+totalUnlocked+' de '+SKILL_DEFS.length+' desbloqueadas.</p></div>';

  SKILL_GROUPS.forEach(function(group){
    var items = SKILL_DEFS.filter(function(sk){ return sk.group===group; });
    if(!items.length) return;
    var unlockedCount = items.filter(function(sk){ return sk.prog(state) >= sk.need; }).length;
    html += '<div class="card"><h3 style="margin-top:0;display:flex;align-items:center;justify-content:space-between;">'+
      '<span>'+esc(group)+'</span><span class="faint mono">'+unlockedCount+' / '+items.length+'</span></h3>'+
      '<div class="skill-grid">';
    items.forEach(function(sk){
      var prog = sk.prog(state), unlocked = prog >= sk.need, p = Math.min(100, Math.round(100*prog/sk.need));
      html += '<div class="skill'+(unlocked?' unlocked':' locked')+'">'+
        '<div class="sk-badge">'+icon(unlocked?'trophy':'lock')+'</div>'+
        '<div class="sk-icon" style="background:var(--'+sk.color+'-bg);color:var(--'+sk.color+')">'+icon(sk.icon)+'</div>'+
        '<div class="sk-name">'+esc(sk.name)+'</div>'+
        '<div class="sk-desc">'+esc(sk.desc)+'</div>'+
        '<div class="sk-track"><div class="sk-fill" style="width:'+p+'%;background:var(--'+sk.color+')"></div></div>'+
        '<div class="sk-prog">'+Math.min(prog,sk.need)+' / '+sk.need+'</div>'+

    });
    html += '</div></div>';
  });
  return html;

function renderRankCard(opts){
  var html = '<div class="card"><h3 style="margin-top:0;">'+icon(opts.icon)+' '+opts.heading+'</h3>';

    html += '<div class="empty">'+(opts.emptyText||'Nada por aqui ainda.')+'</div></div>';
    return html;
  }
  html += '<div class="quest-list">';
  opts.rows.forEach(function(r,i){
    var pos=i+1;
    var medal = pos===1?'var(--gold)':pos===2?'#8FA0B3':pos===3?'#B4784A':'var(--ink-faint)';
    var medalBg = pos===1?'var(--gold-bg)':pos<=3?'var(--card-soft)':'transparent';
    html += '<div class="friend-row">'+
      '<div style="display:flex;align-items:center;gap:12px;">'+
        '<div class="rank-badge" style="color:'+medal+';background:'+medalBg+';border-color:'+medal+';">'+((pos===1 && r.crown) ? icon('trophy') : pos)+'</div>'+
        '<div class="friend-info">'+
          '<div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;">'+
            '<span class="q-name">'+esc(r.name)+(r.isMe?' <span class="faint">(você)</span>':'')+'</span>'+

          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="mono" style="font-size:12.5px;color:var(--ink-soft);">'+r.valueText+'</div>'+
    '</div>';
  });
  html += '</div></div>';
  return html;
}

function renderRanking(){
  var rows = [{ code:'__me__', isMe:true, data:myPublicStats() }];

function renderBestHabitMonth(){
  var mk = monthKey();
  var people = [{ code:'__me__', isMe:true, data:myPublicStats() }];

    var p = community.profiles[code];

  });
  html += '</div><div class="inline-form">'+
    '<input class="field" id="newEmployInput" placeholder="Nova tarefa de empregabilidade"/>'+
    '<button class="btn" id="addEmployBtn">'+icon('plus')+'</button>'+
  '</div></div>';
  return html;
}

/* ================= EVENTOS ================= */

function bindEvents(){
  app.querySelectorAll('[data-tab]').forEach(function(el){
    el.addEventListener('click', function(){
      activeTab = el.getAttribute('data-tab');
      render();
      if(activeTab==='comunidade' && firebaseReady && state.myName){ publishMyProfile(); refreshCommunity(); }
    });
  });
  app.querySelectorAll('[data-toggle]').forEach(function(el){
    el.addEventListener('click', function(){
      var parts = el.getAttribute('data-toggle').split(':');
      if(parts[0]==='cat') toggleCategoryTask(parts[1]);
      else if(parts[0]==='custom') toggleCustomTask(parts[1]);
      else if(parts[0]==='study') toggleStudyItem(parseInt(parts[1]), parseInt(parts[2]));
      else if(parts[0]==='employ') toggleEmployTask(parts[1]);
    });
  });
  app.querySelectorAll('[data-remove]').forEach(function(el){
    el.addEventListener('click', function(e){ e.stopPropagation(); removeCustomTask(el.getAttribute('data-remove')); });
  });
  app.querySelectorAll('[data-openphase]').forEach(function(el){
    el.addEventListener('click', function(){
      var idx = parseInt(el.getAttribute('data-openphase'));
      openPhase = (openPhase===idx) ? null : idx;
      render();
    });
  });
  app.querySelectorAll('[data-bonus]').forEach(function(el){
    el.addEventListener('click', function(){
      var parts = el.getAttribute('data-bonus').split(':');
      toggleBonusItem(parseInt(parts[0]), parseInt(parts[1]));
    });
  });

  bindClick('addTaskBtn', function(){ addCustomTask(byId('newTaskInput').value); });
  bindEnter('newTaskInput', function(v){ addCustomTask(v); });
  bindClick('addEmployBtn', function(){ addEmployTask(byId('newEmployInput').value); });
  bindEnter('newEmployInput', function(v){ addEmployTask(v); });
  bindClick('diarySaveBtn', function(){ addDiaryEntry(byId('diaryInput').value); });
  bindClick('resetBtn', resetAll);
  bindClick('dismissPenalty', function(){ penaltyMessage = null; render(); });
  bindClick('dismissMonthlyWin', function(){ monthlyWinMessage = null; render(); });

  bindClick('saveNameBtn', function(){
    var v = byId('myNameInput').value.trim();
    if(!v) return;
    state.myName = v.slice(0,24);
    ensureMyCode();
    saveState();
    publishMyProfile();
    refreshCommunity();
    render();
  });
  bindEnter('myNameInput', function(v){ byId('saveNameBtn') && byId('saveNameBtn').click(); });

  bindClick('copyCodeBtn', function(){
    var code = state.myCode || '';
    if(navigator.clipboard){ navigator.clipboard.writeText(code).catch(function(){}); }
  });

  bindClick('addFriendBtn', function(){ addFriend(byId('friendCodeInput').value); });
  bindEnter('friendCodeInput', function(v){ addFriend(v); });

  bindClick('refreshCommunityBtn', refreshCommunity);

  app.querySelectorAll('[data-remove-friend]').forEach(function(el){
    el.addEventListener('click', function(){ removeFriend(el.getAttribute('data-remove-friend')); });
  });
  app.querySelectorAll('[data-cheer-open]').forEach(function(el){
    el.addEventListener('click', function(){
      var code = el.getAttribute('data-cheer-open');
      community.sendOpenFor = (community.sendOpenFor===code) ? null : code;
      render();
    });
  });
  app.querySelectorAll('[data-cheer-send]').forEach(function(el){
    el.addEventListener('click', function(){
      var parts = el.getAttribute('data-cheer-send').split('|');
      sendCheer(parts[0], parts[1]);
    });
  });

  bind3DTilt();
}

/* ---- efeito visual de inclinação 3D (não afeta estado/funcionalidade) ---- */
function bind3DTilt(){
  if(window.matchMedia && !window.matchMedia('(hover:hover)').matches) return;
  app.querySelectorAll('.hero, .skill, .level-card').forEach(function(el){
    el.addEventListener('mousemove', function(e){
      var r = el.getBoundingClientRect();
      var px = (e.clientX - r.left)/r.width - 0.5;
      var py = (e.clientY - r.top)/r.height - 0.5;
      var maxTilt = el.classList.contains('skill') ? 7 : 4;
      el.style.transform = 'perspective(800px) rotateX('+(-py*maxTilt)+'deg) rotateY('+(px*maxTilt)+'deg) translateY(-2px)';
    });
    el.addEventListener('mouseleave', function(){ el.style.transform = ''; });
  });
}
function byId(id){ return document.getElementById(id); }
function bindClick(id, fn){ var el = byId(id); if(el) el.addEventListener('click', fn); }
function bindEnter(id, fn){ var el = byId(id); if(el) el.addEventListener('keydown', function(e){ if(e.key==='Enter') fn(el.value); }); }

loadState();

})();
</script>
